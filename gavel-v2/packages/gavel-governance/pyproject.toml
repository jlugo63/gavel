[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gavel-governance"
version = "0.1.0"
description = "Constitutional governance chains for AI agent systems — tamper-evident, multi-principal decision workflows with AGT PolicyDecision output"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "jlugo63" },
]
keywords = [
    "ai",
    "agents",
    "governance",
    "constitutional",
    "safety",
    "audit",
    "policy",
    "trust",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[project.urls]
Homepage = "https://github.com/jlugo63/gavel"
Repository = "https://github.com/jlugo63/gavel"
Documentation = "https://github.com/jlugo63/gavel/tree/main/packages/gavel-governance"

[tool.hatch.build.targets.wheel]
packages = ["src/gavel_governance"]

[tool.pytest.ini_options]
testpaths = ["tests"]
