# Gavel Alembic configuration.
#
# The actual database URL is resolved at runtime by ``gavel.db.engine``
# (respecting ``GAVEL_DB_URL``). ``sqlalchemy.url`` here is intentionally
# blank; ``env.py`` fills it in from :func:`gavel.db.engine.resolve_database_url`.

[alembic]
script_location = gavel/db/migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
