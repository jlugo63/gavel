services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required (see .env.example)}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required (see .env.example)}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (see .env.example)}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - gavel-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  gavel-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - GAVEL_DB_URL=postgresql+asyncpg://${POSTGRES_USER:?POSTGRES_USER is required (see .env.example)}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (see .env.example)}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:?POSTGRES_DB is required (see .env.example)}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  gavel-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ADMIN_MODE: ${GAVEL_ADMIN_MODE:-false}
    ports:
      - "${GAVEL_PORT:-8100}:8100"
    env_file:
      - .env
    environment:
      - GAVEL_DB_URL=postgresql+asyncpg://${POSTGRES_USER:?POSTGRES_USER is required (see .env.example)}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (see .env.example)}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:?POSTGRES_DB is required (see .env.example)}
    depends_on:
      postgres:
        condition: service_healthy
      gavel-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - gavel-data:/app/data

  gavel-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8200:8200"
    env_file:
      - .env
    environment:
      - GAVEL_API_URL=http://gavel-gateway:8100
      - GAVEL_DB_URL=postgresql+asyncpg://${POSTGRES_USER:?POSTGRES_USER is required (see .env.example)}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (see .env.example)}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:?POSTGRES_DB is required (see .env.example)}
    depends_on:
      postgres:
        condition: service_healthy
      gavel-migrate:
        condition: service_completed_successfully
      gavel-gateway:
        condition: service_healthy
    restart: unless-stopped
    command: ["uvicorn", "gavel.gateway:app", "--host", "0.0.0.0", "--port", "8200"]

volumes:
  gavel-data:
  gavel-pgdata:
